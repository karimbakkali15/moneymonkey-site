<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Monkey - Smart Finance Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0816;
            color: #fff;
            min-height: 100vh;
        }
        .container { max-width: 720px; margin: 0 auto; padding: 60px 24px; }
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #34d399, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tagline {
            font-size: 1.15rem;
            color: rgba(255,255,255,0.6);
            margin-bottom: 48px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .links a {
            display: block;
            padding: 20px 24px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            color: #fff;
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 600;
            transition: background 0.2s;
        }
        .links a:hover { background: rgba(255,255,255,0.1); }
        .links a span {
            display: block;
            font-size: 0.85rem;
            font-weight: 400;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
        }
        footer {
            margin-top: 64px;
            color: rgba(255,255,255,0.3);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Money Monkey</h1>
        <p class="tagline">AI-powered finance tracking for smarter money decisions.</p>

        <div class="links">
            <a href="privacy-policy.html">
                Privacy Policy
                <span>How we handle and protect your data</span>
            </a>
            <a href="terms.html">
                Terms of Use
                <span>Terms and conditions for using Money Monkey</span>
            </a>
            <a href="support.html">
                Support
                <span>Get help or contact us</span>
            </a>
        </div>

        <footer>
            &copy; 2026 Money Monkey. All rights reserved.
        </footer>
    </div>
</body>
</html>
